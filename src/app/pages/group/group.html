<p-toast></p-toast>

<!-- DASHBOARD -->
<p-card header="Resumen del Grupo">
  <div class="row">
    <div>
      <h3>Total Grupos</h3>
      <p-tag severity="info" [value]="total.toString()"></p-tag>
    </div>

    <div class="progress">
      <h3>Avance</h3>
      <p-progressBar [value]="avance"></p-progressBar>
    </div>
  </div>
</p-card>

<p-divider></p-divider>

<!-- CRUD SECTION -->
<p-card header="Gestión de Grupos">
  <p-button
    label="Nuevo Grupo"
    icon="pi pi-plus"
    (onClick)="openNew()"
    class="mb-3"
  ></p-button>

  <p-table [value]="groups" [paginator]="true" [rows]="5">
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th>Nivel</th>
        <th>Autor</th>
        <th>Integrantes</th>
        <th>Tickets</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.nombre }}</td>
        <td>{{ row.nivel }}</td>
        <td>{{ row.autor }}</td>
        <td>{{ row.integrantes }}</td>
        <td>{{ row.tickets }}</td>
        <td>{{ row.descripcion }}</td>

        <td class="actions">
          <!-- EDIT -->
          <p-button
            icon="pi pi-pencil"
            severity="success"
            (onClick)="editGroup(row)"
          ></p-button>

          <!-- DELETE -->
          <p-button
            icon="pi pi-trash"
            severity="danger"
            (onClick)="deleteGroup(row)"
          ></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>


<p-dialog
  [(visible)]="dialogVisible"
  header="Formulario Grupo"
  [modal]="true"
  [style]="{ width: '420px' }"
>
  <div class="field">
    <label>Nombre</label>
    <input pInputText [(ngModel)]="group.nombre" />
  </div>

  <div class="field">
    <label>Nivel</label>
    <input pInputText [(ngModel)]="group.nivel" />
  </div>

  <div class="field">
    <label>Autor</label>
    <input pInputText [(ngModel)]="group.autor" />
  </div>

  <div class="field">
    <label>Integrantes</label>
    <p-inputNumber [(ngModel)]="group.integrantes"></p-inputNumber>
  </div>

  <div class="field">
    <label>Tickets</label>
    <p-inputNumber [(ngModel)]="group.tickets"></p-inputNumber>
  </div>

  <div class="field">
    <label>Descripción</label>
    <input pInputText [(ngModel)]="group.descripcion" />
  </div>

  <ng-template pTemplate="footer">
    <p-button
      label="Cancelar"
      severity="secondary"
      (onClick)="dialogVisible = false"
    ></p-button>

    <p-button
      label="Guardar"
      severity="success"
      (onClick)="saveGroup()"
    ></p-button>
  </ng-template>
</p-dialog>
