<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<p-card header="Perfil de Usuario">

  <div class="profile-header">
    <p-avatar 
      label="E" 
      size="xlarge" 
      shape="circle">
    </p-avatar>

    <div>
      <h2>{{ profile.username }}</h2>
      <p>{{ profile.role }}</p>
    </div>
  </div>

  <p-divider></p-divider>

  <div class="profile-info">
    <p><strong>Email:</strong> {{ profile.email }}</p>
    <p><strong>Teléfono:</strong> {{ profile.phone }}</p>
    <p><strong>Dirección:</strong> {{ profile.address }}</p>
    <p><strong>Fecha de nacimiento:</strong> {{ profile.birthdate }}</p>
  </div>

  <p-divider></p-divider>

  <div class="actions">

    <!-- EDIT -->
    <p-button 
      label="Editar Perfil" 
      icon="pi pi-pencil"
      severity="success"
      (onClick)="openEdit()">
    </p-button>

    <!-- DELETE -->
    <p-button 
      label="Eliminar Cuenta" 
      icon="pi pi-trash"
      severity="danger"
      (onClick)="confirmDelete()">
    </p-button>

  </div>

</p-card>

<!-- EDIT DIALOG -->
<p-dialog 
  [(visible)]="editDialog"
  header="Editar Perfil"
  [modal]="true"
  [style]="{ width: '400px' }">

  <div class="field">
    <label>Nombre</label>
    <input pInputText [(ngModel)]="tempProfile.username">
  </div>

  <div class="field">
    <label>Email</label>
    <input pInputText [(ngModel)]="tempProfile.email">
  </div>

  <div class="field">
    <label>Teléfono</label>
    <input pInputText [(ngModel)]="tempProfile.phone">
  </div>

  <div class="field">
    <label>Dirección</label>
    <input pInputText [(ngModel)]="tempProfile.address">
  </div>

  <ng-template pTemplate="footer">

      <p-button 
      label="Cancelar"
      severity="secondary"
      (onClick)="editDialog=false">
      </p-button>

    <p-button 
      label="Guardar"
      icon="pi pi-check"
      severity="success"
      (onClick)="saveProfile()">
    </p-button>

  </ng-template>

</p-dialog>
